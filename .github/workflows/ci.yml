name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # Use Flutter (it bundles the Dart SDK) so packages whose example/ depends
      # on flutter_test resolve correctly; dart-only packages still work.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze
      - name: Test
        run: |
          if [ -d test ] && grep -rqlE 'test\(|testWidgets\(' test; then
            # Use `flutter test` when the package depends on the Flutter SDK
            # (flutter_test); fall back to `dart test` for pure-Dart packages.
            if grep -q 'sdk: flutter' pubspec.yaml; then
              flutter test
            else
              dart test
            fi
          else
            echo "no test cases found — skipping"
          fi
